<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Rate Drift Analyzer</title>
    <style>
        :root {
            --accent-orange: #fc4c02;
            --accent-orange-deep: #d94704;
            --accent-orange-soft: #fff1ea;
            --accent-orange-wash: #ffe0d1;
            --ink: #23201c;
            --muted: #6e625a;
            --line: #f1d2c2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(160deg, #ff7a3d 0%, #fc4c02 45%, #b83a03 100%);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 48px 20px 20px;
        }

        .container {
            background: #fffdfb;
            border-radius: 14px;
            box-shadow: 0 18px 50px rgba(64, 24, 7, 0.22);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.28);
        }

        h1 {
            color: var(--ink);
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--muted);
            font-weight: 500;
            font-size: 14px;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: block;
            padding: 15px;
            background: #fff7f2;
            border: 2px dashed #ff9a6f;
            border-radius: 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .file-input-label:hover {
            background: var(--accent-orange-soft);
            border-color: var(--accent-orange);
        }

        .file-input-label.drag-over {
            background: var(--accent-orange-soft);
            border-color: var(--accent-orange);
        }

        .file-name {
            color: var(--accent-orange);
            font-weight: 500;
            margin-top: 8px;
            font-size: 13px;
            min-height: 18px;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--line);
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
            color: var(--ink);
            background: #fff;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--accent-orange);
            box-shadow: 0 0 0 4px rgba(252, 76, 2, 0.12);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--accent-orange);
        }

        .checkbox-label {
            margin: 0;
            cursor: pointer;
            font-weight: normal;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit {
            background: linear-gradient(135deg, #ff6b2c 0%, #fc4c02 100%);
            color: white;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(252, 76, 2, 0.35);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-reset {
            background: #fff3ec;
            color: var(--ink);
            border: 1px solid var(--line);
        }

        .btn-reset:hover {
            background: var(--accent-orange-wash);
        }

        .results-section {
            display: none;
            margin-top: 35px;
            padding-top: 30px;
            border-top: 2px solid var(--line);
        }

        .results-section.active {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-item {
            background: #fff8f4;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 12px;
            border-left: 4px solid #ff8a57;
        }

        .result-label {
            color: var(--muted);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .result-value {
            color: var(--ink);
            font-size: 20px;
            font-weight: 600;
        }

        .result-secondary {
            color: #9c8376;
            font-size: 12px;
            margin-top: 5px;
        }

        .result-item.highlight {
            border-left-color: var(--accent-orange);
            background: linear-gradient(135deg, #fff4ee 0%, #ffe6d8 100%);
        }

        .error-message {
            background: #fff0eb;
            color: #b12b00;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            border-left: 4px solid #d43d00;
            display: none;
        }

        .error-message.active {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 3px solid #f8dfd2;
            border-top: 3px solid var(--accent-orange);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .details-section {
            margin-top: 20px;
            padding: 15px;
            background: #fff8f4;
            border-radius: 5px;
            display: none;
            border: 1px solid var(--line);
        }

        .details-section.active {
            display: block;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }

        .detail-item {
            font-size: 13px;
        }

        .detail-label {
            color: #9c8376;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
        }

        .detail-value {
            color: var(--ink);
            font-weight: 600;
            margin-top: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏃 Heart Rate Drift Analyzer</h1>

        <form id="uploadForm">
            <div class="form-group">
                <label for="gpxFile">GPX File</label>
                <div class="file-input-wrapper">
                    <input 
                        type="file" 
                        id="gpxFile" 
                        name="file" 
                        accept=".gpx"
                        required
                    >
                    <label for="gpxFile" class="file-input-label" id="fileInputLabel">
                        <div>📁 Drag and drop your GPX file here</div>
                        <div style="font-size: 12px; color: #999; margin-top: 5px;">or click to select</div>
                    </label>
                    <div class="file-name" id="fileName"></div>
                </div>
            </div>

            <div class="form-group">
                <label for="skipFirst">Warm-up Duration (minutes)</label>
                <input 
                    type="number" 
                    id="skipFirst" 
                    name="skip_first" 
                    value="15" 
                    min="0"
                    max="120"
                >
            </div>

            <div class="form-group">
                <label for="skipLast">Cool-down Duration (minutes)</label>
                <input 
                    type="number" 
                    id="skipLast" 
                    name="skip_last" 
                    value="15" 
                    min="0"
                    max="120"
                >
            </div>

            <div class="form-group">
                <div class="checkbox-group">
                    <input 
                        type="checkbox" 
                        id="verbose" 
                        name="verbose"
                    >
                    <label for="verbose" class="checkbox-label">Show detailed analysis</label>
                </div>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-submit" id="submitBtn">Analyze GPX</button>
                <button type="button" class="btn-reset" id="clearBtn">Clear</button>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Analyzing your workout...</p>
            </div>

            <div class="error-message" id="errorMessage"></div>
        </form>

        <div class="results-section" id="resultsSection">
            <h2 style="color: #333; margin-bottom: 20px; font-size: 20px;">Results</h2>

            <div class="result-item highlight">
                <div class="result-label">Aerobic Decoupling Percentage</div>
                <div class="result-value" id="decouplingPercent">-</div>
                <div class="result-secondary" id="decouplingPercent2">-</div>
            </div>

            <div class="result-item">
                <div class="detail-grid">
                    <div>
                        <div class="result-label">Total Workout Duration</div>
                        <div class="result-value" id="totalDuration">-</div>
                    </div>
                    <div>
                        <div class="result-label">Analysed Duration</div>
                        <div class="result-value" id="analyzedDuration">-</div>
                    </div>
                </div>
            </div>

            <div class="details-section" id="detailsSection">
                <strong style="color: #333;">Detailed Analysis</strong>
                
                <div style="margin-top: 15px; margin-bottom: 20px;">
                    <div class="detail-grid">
                        <div>
                            <div style="color: #666; font-size: 13px; font-weight: 600; margin-bottom: 8px;">First Half</div>
                            <div class="detail-item">
                                <div class="detail-label">Distance</div>
                                <div class="detail-value" id="firstDistance">-</div>
                            </div>
                            <div class="detail-item" style="margin-top: 8px;">
                                <div class="detail-label">Avg HR</div>
                                <div class="detail-value" id="firstHr">-</div>
                            </div>
                            <div class="detail-item" style="margin-top: 8px;">
                                <div class="detail-label">Efficiency Factor</div>
                                <div class="detail-value" id="firstEf">-</div>
                            </div>
                        </div>
                        <div>
                            <div style="color: #666; font-size: 13px; font-weight: 600; margin-bottom: 8px;">Second Half</div>
                            <div class="detail-item">
                                <div class="detail-label">Distance</div>
                                <div class="detail-value" id="lastDistance">-</div>
                            </div>
                            <div class="detail-item" style="margin-top: 8px;">
                                <div class="detail-label">Avg HR</div>
                                <div class="detail-value" id="lastHr">-</div>
                            </div>
                            <div class="detail-item" style="margin-top: 8px;">
                                <div class="detail-label">Efficiency Factor</div>
                                <div class="detail-value" id="lastEf">-</div>
                            </div>
                    </div>
                </div>

                <div style="border-top: 1px solid #e0e0e0; padding-top: 15px;">
                    <div style="color: #666; font-size: 13px; font-weight: 600; margin-bottom: 10px;">Delta</div>
                    <div class="detail-grid">
                        <div class="detail-item">
                            <div class="detail-label">HR Change</div>
                            <div class="detail-value" id="hrChange">-</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">EF Change</div>
                            <div class="detail-value" id="efChange">-</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('uploadForm');
        const fileInput = document.getElementById('gpxFile');
        const fileInputLabel = document.getElementById('fileInputLabel');
        const fileName = document.getElementById('fileName');
        const loading = document.getElementById('loading');
        const resultsSection = document.getElementById('resultsSection');
        const errorMessage = document.getElementById('errorMessage');
        const detailsSection = document.getElementById('detailsSection');
        const verboseCheckbox = document.getElementById('verbose');

        // File input handling
        fileInput.addEventListener('change', function() {
            if (this.files.length > 0) {
                fileName.textContent = `📄 ${this.files[0].name}`;
            }
        });

        // Drag and drop
        fileInputLabel.addEventListener('dragover', function(e) {
            e.preventDefault();
            fileInputLabel.classList.add('drag-over');
        });

        fileInputLabel.addEventListener('dragleave', function() {
            fileInputLabel.classList.remove('drag-over');
        });

        fileInputLabel.addEventListener('drop', function(e) {
            e.preventDefault();
            fileInputLabel.classList.remove('drag-over');
            fileInput.files = e.dataTransfer.files;
            if (fileInput.files.length > 0) {
                fileName.textContent = `📄 ${fileInput.files[0].name}`;
            }
        });

        // Form submission
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            if (!fileInput.files.length) {
                showError('Please select a GPX file');
                return;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('skip_first', document.getElementById('skipFirst').value);
            formData.append('skip_last', document.getElementById('skipLast').value);
            formData.append('verbose', 'true');

            loading.classList.add('active');
            errorMessage.classList.remove('active');
            resultsSection.classList.remove('active');

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.status === 'success') {
                    displayResults(data.data);
                    resultsSection.classList.add('active');
                } else {
                    showError(data.message);
                }
            } catch (error) {
                showError(`Error: ${error.message}`);
            } finally {
                loading.classList.remove('active');
            }
        });

        function displayResults(data) {
            document.getElementById('decouplingPercent').textContent = 
                `${data.decoupling_percent}%`;
            document.getElementById('decouplingPercent2').textContent = 
                `TP Equivalent: ${data.tp_equivalent}%`;
            document.getElementById('totalDuration').textContent = data.total_duration;
            document.getElementById('analyzedDuration').textContent = calculateAnalyzedDuration(
                data.total_duration,
                data.skip_first_mins,
                data.skip_last_mins
            );

            if (data.ef_change !== undefined) {
                document.getElementById('firstDistance').textContent = 
                    `${data.first_distance_km} km`;
                document.getElementById('firstHr').textContent = 
                    `${data.first_avg_hr} bpm`;
                document.getElementById('lastDistance').textContent = 
                    `${data.last_distance_km} km`;
                document.getElementById('lastHr').textContent = 
                    `${data.last_avg_hr} bpm`;
                document.getElementById('firstEf').textContent = 
                    `${(data.first_ef * 1000).toFixed(2)} m/bpm`;
                document.getElementById('lastEf').textContent = 
                    `${(data.last_ef * 1000).toFixed(2)} m/bpm`;
                
                // Calculate HR change
                const hrChange = data.last_avg_hr - data.first_avg_hr;
                document.getElementById('hrChange').textContent = 
                    `${hrChange >= 0 ? '+' : ''}${hrChange.toFixed(2)} bpm`;
                
                document.getElementById('efChange').textContent = 
                    `${(data.ef_change * 1000).toFixed(2)} m/bpm`;

                if (verboseCheckbox.checked) {
                    detailsSection.classList.add('active');
                } else {
                    detailsSection.classList.remove('active');
                }
            } else {
                detailsSection.classList.remove('active');
            }
        }

        function calculateAnalyzedDuration(totalDurationText, skipFirstMins, skipLastMins) {
            const totalSeconds = parseDurationToSeconds(totalDurationText);
            const activeSeconds = Math.max(0, totalSeconds - (skipFirstMins * 60) - (skipLastMins * 60));

            return formatDuration(activeSeconds);
        }

        function parseDurationToSeconds(durationText) {
            const parts = durationText.split(':').map(Number);

            if (parts.some(Number.isNaN)) {
                return 0;
            }

            if (parts.length === 3) {
                return (parts[0] * 3600) + (parts[1] * 60) + parts[2];
            }

            if (parts.length === 2) {
                return (parts[0] * 60) + parts[1];
            }

            return 0;
        }

        function formatDuration(totalSeconds) {
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;

            return [hours, minutes, seconds]
                .map((value, index) => index === 0 ? String(value) : String(value).padStart(2, '0'))
                .join(':');
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('active');
        }

        // Update details visibility with verbose checkbox
        verboseCheckbox.addEventListener('change', function() {
            if (resultsSection.classList.contains('active')) {
                if (this.checked) {
                    detailsSection.classList.add('active');
                } else {
                    detailsSection.classList.remove('active');
                }
            }
        });

        // Clear button
        document.getElementById('clearBtn').addEventListener('click', function() {
            form.reset();
            fileName.textContent = '';
            resultsSection.classList.remove('active');
            errorMessage.classList.remove('active');
            detailsSection.classList.remove('active');
        });
    </script>
</body>
</html>
